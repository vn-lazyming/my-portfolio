<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>writing · lazyming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/dossier.css" />
  <link rel="stylesheet" href="../css/blog.css" />
  <!-- Set theme before paint to avoid flash of wrong theme -->
  <script>
    try {
      if (sessionStorage.getItem('lm_theme') === 'night') {
        document.documentElement.setAttribute('data-theme', 'night');
      }
    } catch (e) {}
  </script>
</head>
<body>

<div class="sheet">

  <div class="sheet-bg">
    <div class="wm">FIELD NOTES</div>
  </div>

  <div class="strip">
    <span class="l">field dossier · vol.02</span>
    <span class="c">▸ writing log</span>
    <span class="r">
      <span>all entries</span>
      <span class="theme-hint">← prefer dark?</span>
      <button type="button" class="theme-toggle attract" data-theme-toggle aria-label="toggle theme">☾ night</button>
    </span>
  </div>

  <a class="blog-back" href="../index.html#blog"><span class="arr">←</span> back to dossier</a>

  <h1 class="blog-h1">writing log <span class="sig">— field notes &amp; CVE walkthroughs</span></h1>

  <section>
    <div class="h-row">
      <span class="num">w/</span>
      <h2 class="name">all entries</h2>
      <span class="meta" id="postCount">loading…</span>
    </div>

    <div id="postList"></div>
  </section>

  <footer>
    <span><span class="red">●</span> &nbsp; lzm · writing log · 2026</span>
    <span class="ascii">"make it exist, then perfect it."</span>
  </footer>

</div>

<script src="../js/theme.js"></script>
<script src="../js/blog-list.js"></script>
<script>
  Blog.renderPostList({
    manifest:   'posts/manifest.json',
    listEl:     '#postList',
    countEl:    '#postCount',
    linkPrefix: 'post.html?slug=',
    idPrefix:   'W',
    kind:       p => Blog.fmtDate(p.date)
  });
</script>
</body>
</html>
