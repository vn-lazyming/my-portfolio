<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post | LazyMing</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="blog.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    rel="stylesheet" />
</head>

<body>
  <!------Top Navigation----->
  <nav class="topNav" id="topNav"></nav>
  <script src="../js/nav.js"></script>

  <div class="mainContentContainer">
    <div class="blogPostSection">
      <a href="index.html" class="backLink">← Back to Blog</a>
      <div class="postHeader">
        <span class="postDate" id="postDate"></span>
        <div class="postTags" id="postTags"></div>
      </div>
      <div id="content" class="markdownContent"></div>
    </div>
  </div>

  <!-- marked.js from CDN — renders markdown to HTML in the browser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../js/navBar.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      window.location.href = 'index.html';
    }

    // Load post metadata from manifest for date/tags
    fetch('posts/manifest.json')
      .then(r => r.json())
      .then(posts => {
        const meta = posts.find(p => p.slug === slug);
        if (meta) {
          document.title = `${meta.title} | LazyMing`;
          document.getElementById('postDate').textContent = meta.date;
          document.getElementById('postTags').innerHTML = meta.tags.map(t =>
            `<span class="skillCard skillCardInProjectSection">${t}</span>`
          ).join('');
        }
      });

    // Fetch and render the markdown file
    fetch(`posts/${slug}.md`)
      .then(r => {
        if (!r.ok) throw new Error('Post not found');
        return r.text();
      })
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
      })
      .catch(() => {
        document.getElementById('content').innerHTML =
          '<p style="color: var(--color-text-secondary);">Post not found.</p>';
      });
  </script>
</body>

</html>
