<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>entry · lazyming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/dossier.css" />
  <link rel="stylesheet" href="../css/blog.css" />
  <!-- Syntax highlighting (one of the two is disabled at runtime by theme.js) -->
  <link rel="stylesheet" data-theme-light href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" />
  <link rel="stylesheet" data-theme-dark  href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" disabled />
  <!-- Set theme before paint to avoid flash of wrong theme -->
  <script>
    try {
      if (sessionStorage.getItem('lm_theme') === 'night') {
        document.documentElement.setAttribute('data-theme', 'night');
      }
    } catch (e) {}
  </script>
</head>
<body>

<div class="sheet">

  <div class="sheet-bg">
    <div class="wm">ENTRY</div>
  </div>

  <div class="strip">
    <span class="l">field dossier · vol.02</span>
    <span class="c">▸ writing entry</span>
    <span class="r">
      <span>log</span>
      <span class="theme-hint">← prefer <span data-when-day>dark</span><span data-when-night>light</span>?</span>
      <button type="button" class="theme-toggle attract" data-theme-toggle aria-label="toggle theme"><span data-when-day>☾ night</span><span data-when-night>☀ day</span></button>
    </span>
  </div>

  <a class="blog-back" href="index.html"><span class="arr">←</span> all entries</a>

  <div class="post-meta">
    <span class="date" id="postDate">----·--·--</span>
    <span class="sep">/</span>
    <span class="tags" id="postTags"></span>
  </div>

  <h1 class="post-title" id="postTitle">loading…</h1>
  <p class="post-dek" id="postDek"></p>

  <article id="postContent">
    <p class="muted">loading entry…</p>
  </article>

  <div class="eop">
    <span><span class="red">●</span> &nbsp; end of entry</span>
    <div class="share">
      <a href="#" onclick="event.preventDefault();navigator.clipboard&&navigator.clipboard.writeText(location.href)">copy link</a>

      <a href="https://hackmd.io/@mlc0cVjxSwqv0OoxsUYccw" target="_blank" rel="noopener noreferrer">hackmd</a>
    </div>
  </div>

  <div class="more">
    <div class="more-h">// related entries</div>
    <div class="more-list" id="moreList"></div>
  </div>

  <footer>
    <span><span class="red">●</span> &nbsp; lzm · writing log · 2026</span>
    <span class="ascii">"make it exist, then perfect it."</span>
  </footer>

</div>

<script src="../js/theme.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>

</html>
